name: CI - Code Quality & Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '7.4'
        coverage: none

    - name: Check PHP Syntax (Lint)
      run: |
        find . -name "*.php" ! -path "./build/*" ! -path "./dist/*" -print0 | xargs -0 -n 1 -P 4 php -l
